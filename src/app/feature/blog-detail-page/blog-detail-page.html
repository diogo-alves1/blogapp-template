@if (blog()) {
  <h1>{{ blog()!.title }}</h1>

  <p>
    <strong>Autor:</strong>
    {{ blog()!.author }}
  </p>

  @if (blog()!.headerImageUrl) {
    <img [src]="blog()!.headerImageUrl" [alt]="blog()!.title" width="600" />
  }

  <p>{{ blog()!.contentPreview }}</p>

  <p>Likes: {{ blog()!.likes }}</p>
} @else {
  <p>Blog nicht gefunden.</p>
}
