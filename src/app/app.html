<mat-toolbar color="primary">
  <span>{{ title }}</span>

  <span class="spacer"></span>

  <button mat-icon-button (click)="toggleTheme()">
    <mat-icon>
      {{ isDarkMode ? 'light_mode' : 'dark_mode' }}
    </mat-icon>
  </button>

  <a mat-button routerLink="/" routerLinkActive="active-link"> Home </a>
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>
